name: Node.js Automated Quality Assurance

# Triggers the workflow on every push to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code onto the runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up a clean Node.js environment
    - name: Use Node.js Setup
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'

    # Step 3: Install project dependencies based on package-lock.json
    - name: Install Dependencies
      run: npm ci

    # Step 4: Run the test script defined in package.json
    - name: Run Automated Test Suite
      run: npm test